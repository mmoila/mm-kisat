<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MM-Kisat Leaderboard</title>
  <style>
    :root {
      --gold: #FFD700;
      --silver: #C0C0C0;
      --bronze: #CD7F32;
      --bg: #0f1117;
      --card: #1a1d27;
      --border: #2a2d3a;
      --text: #e8eaf0;
      --muted: #6b7280;
      --accent: #3b82f6;
      --green: #22c55e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1d27 0%, #0f1117 100%);
      border-bottom: 1px solid var(--border);
      padding: 24px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }

    .header-left h1 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(90deg, #60a5fa, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-left p {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 4px;
    }

    .update-btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background 0.2s;
    }

    .update-btn:hover { background: #2563eb; }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      width: 100%;
      max-width: 700px;
    }

    .modal h2 {
      margin-bottom: 8px;
      font-size: 1.2rem;
    }

    .modal p {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .modal textarea {
      width: 100%;
      height: 220px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: monospace;
      font-size: 0.8rem;
      padding: 12px;
      resize: vertical;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      justify-content: flex-end;
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 9px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .btn-primary {
      background: var(--accent);
      border: none;
      color: white;
      padding: 9px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 20px;
    }

    .podium {
      display: flex;
      gap: 16px;
      margin-bottom: 32px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .podium-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 28px;
      text-align: center;
      min-width: 160px;
      flex: 1;
      max-width: 220px;
      position: relative;
      overflow: hidden;
    }

    .podium-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
    }

    .podium-card.rank-1::before { background: var(--gold); }
    .podium-card.rank-2::before { background: var(--silver); }
    .podium-card.rank-3::before { background: var(--bronze); }

    .podium-medal {
      font-size: 1.8rem;
      margin-bottom: 8px;
    }

    .podium-name {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .podium-points {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--accent);
    }

    .podium-points-label {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .podium-rank {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .table-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    .table-header {
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 1rem;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      background: rgba(255,255,255,0.03);
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 12px 16px;
      text-align: right;
      white-space: nowrap;
      border-bottom: 1px solid var(--border);
    }

    thead th:first-child,
    thead th:nth-child(2),
    thead th:nth-child(3) { text-align: left; }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.03); }

    tbody tr.empty-slot { opacity: 0.3; }

    td {
      padding: 14px 16px;
      font-size: 0.9rem;
      text-align: right;
      white-space: nowrap;
    }

    td:first-child,
    td:nth-child(2),
    td:nth-child(3) { text-align: left; }

    .rank-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      font-size: 0.8rem;
      font-weight: 700;
    }

    .rank-1 .rank-badge { background: rgba(255,215,0,0.15); color: var(--gold); }
    .rank-2 .rank-badge { background: rgba(192,192,192,0.15); color: var(--silver); }
    .rank-3 .rank-badge { background: rgba(205,127,50,0.15); color: var(--bronze); }

    .name-cell {
      font-weight: 600;
    }

    .total-cell {
      font-weight: 700;
      color: var(--accent);
    }

    .zero { color: var(--muted); }

    .last-updated {
      text-align: right;
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 16px;
    }

    @media (max-width: 600px) {
      header { padding: 16px; }
      .header-left h1 { font-size: 1.3rem; }
      main { padding: 16px 12px; }
      .podium-card { min-width: 120px; padding: 16px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>MM-Kisat Leaderboard</h1>
    <p id="subtitle">Live standings</p>
  </div>
  <button class="update-btn" onclick="openModal()">Update Data</button>
</header>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>Update Standings</h2>
    <p>
      Paste your tab-separated data below (copy directly from Excel/Google Sheets).<br>
      The first row should be the header row. Data is saved in your browser.
    </p>
    <textarea id="pasteArea" placeholder="Sheet&#9;Name&#9;Rank&#9;Total&#9;...&#10;PARTICIPANT A&#9;Mallikarjun&#9;7&#9;5,42&#9;..."></textarea>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="applyData()">Apply &amp; Save</button>
    </div>
  </div>
</div>

<main>
  <div class="podium" id="podium"></div>
  <div class="table-card">
    <div class="table-header">All Participants</div>
    <div class="table-wrap">
      <table id="leaderTable">
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
  <div class="last-updated" id="lastUpdated"></div>
</main>

<script>
  const DEFAULT_DATA = `Sheet\tName\tRank\tTotal\t1X2\tResults\tRound of 32\tRound of 16\tQuarterfinals\tSemifinals\tFinal\tChampion\tGoalscorers\tBookings\tReferee
PARTICIPANT A\tMallikarjun\t7\t5,42\t1,42\t4\t0\t0\t0\t0\t0\t0\t0\t0\t0
PARTICIPANT B\tSamuli\t3\t7,42\t1,42\t6\t0\t0\t0\t0\t0\t0\t0\t0\t0
PARTICIPANT C\tSimo\t1\t10,12\t4,12\t6\t0\t0\t0\t0\t0\t0\t0\t0\t0
PARTICIPANT D\tJouko The Champ\t7\t5,42\t1,42\t4\t0\t0\t0\t0\t0\t0\t0\t0\t0
PARTICIPANT E\tAleksi\t7\t5,42\t1,42\t4\t0\t0\t0\t0\t0\t0\t0\t0\t0
PARTICIPANT F\tOtso\t6\t6,12\t4,12\t2\t0\t0\t0\t0\t0\t0\t0\t0\t0
PARTICIPANT G\tMikael\t3\t7,42\t1,42\t6\t0\t0\t0\t0\t0\t0\t0\t0\t0
PARTICIPANT H\tPete\t1\t10,12\t4,12\t6\t0\t0\t0\t0\t0\t0\t0\t0\t0
PARTICIPANT I\tPekka\t3\t7,42\t1,42\t6\t0\t0\t0\t0\t0\t0\t0\t0\t0
PARTICIPANT J\tX\t10\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0
PARTICIPANT K\tX\t10\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0
PARTICIPANT L\tX\t10\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0
PARTICIPANT M\tX\t10\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0
PARTICIPANT N\tX\t10\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0
PARTICIPANT O\tX\t10\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0
PARTICIPANT P\tX\t10\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0
PARTICIPANT Q\tX\t10\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0
PARTICIPANT R\tX\t10\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0
PARTICIPANT S\tX\t10\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0
PARTICIPANT T\tX\t10\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0
PARTICIPANT U\tX\t10\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0
PARTICIPANT V\tX\t10\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0
PARTICIPANT W\tX\t10\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0
PARTICIPANT X\tX\t10\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0
PARTICIPANT Y\tX\t10\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0
PARTICIPANT Z\tX\t10\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0\t0`;

  const MEDALS = ['🥇', '🥈', '🥉'];

  function parseData(raw) {
    const lines = raw.trim().split('\n').filter(l => l.trim());
    if (lines.length < 2) return null;
    const headers = lines[0].split('\t').map(h => h.trim());
    const rows = lines.slice(1).map(line => {
      const cells = line.split('\t').map(c => c.trim());
      const obj = {};
      headers.forEach((h, i) => obj[h] = cells[i] ?? '');
      return obj;
    });
    return { headers, rows };
  }

  function toNum(val) {
    if (!val || val === '0') return 0;
    return parseFloat(val.replace(',', '.')) || 0;
  }

  function render(data) {
    const { headers, rows } = data;
    const activeRows = rows.filter(r => r['Name'] && r['Name'] !== 'X');
    const emptyRows = rows.filter(r => !r['Name'] || r['Name'] === 'X');
    const sorted = [...activeRows].sort((a, b) => {
      const ra = parseInt(a['Rank']) || 99;
      const rb = parseInt(b['Rank']) || 99;
      if (ra !== rb) return ra - rb;
      return toNum(b['Total']) - toNum(a['Total']);
    });

    // Podium (top 3 unique ranks)
    const podium = document.getElementById('podium');
    podium.innerHTML = '';
    const top3 = sorted.filter(r => parseInt(r['Rank']) <= 3);
    const seen = new Set();
    const podiumItems = [];
    for (const r of top3) {
      const rank = parseInt(r['Rank']);
      if (!seen.has(rank) && podiumItems.length < 3) {
        // Find all with same rank
        const group = top3.filter(x => parseInt(x['Rank']) === rank);
        if (group.length === 1) {
          podiumItems.push({ rank, row: r, tied: false });
          seen.add(rank);
        } else {
          podiumItems.push({ rank, row: null, group, tied: true });
          seen.add(rank);
        }
      }
    }
    // Simpler: just show top 3 rows
    const podiumRows = sorted.slice(0, Math.min(3, sorted.length));
    podiumRows.forEach((row, i) => {
      const rank = parseInt(row['Rank']);
      const card = document.createElement('div');
      card.className = `podium-card rank-${rank <= 3 ? rank : i+1}`;
      card.innerHTML = `
        <div class="podium-medal">${MEDALS[i] || ''}</div>
        <div class="podium-name">${esc(row['Name'])}</div>
        <div class="podium-points">${row['Total'] || '0'}</div>
        <div class="podium-points-label">points</div>
        <div class="podium-rank">Rank #${row['Rank']}</div>
      `;
      podium.appendChild(card);
    });

    // Table headers (skip "Sheet" column, show from Name onwards)
    const showHeaders = headers.filter(h => h !== 'Sheet');
    const thead = document.getElementById('tableHead');
    thead.innerHTML = '<tr>' + showHeaders.map(h => `<th>${esc(h)}</th>`).join('') + '</tr>';

    // Table body
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    const allRows = [...sorted, ...emptyRows];
    allRows.forEach(row => {
      const rank = parseInt(row['Rank']) || 99;
      const isEmpty = !row['Name'] || row['Name'] === 'X';
      const tr = document.createElement('tr');
      tr.className = (isEmpty ? 'empty-slot ' : '') + (rank <= 3 ? `rank-${rank}` : '');
      const cells = showHeaders.map(h => {
        const val = row[h] ?? '';
        if (h === 'Rank') return `<td><span class="rank-badge">${esc(val)}</span></td>`;
        if (h === 'Name') return `<td class="name-cell">${esc(val)}</td>`;
        if (h === 'Total') return `<td class="total-cell">${esc(val)}</td>`;
        const num = toNum(val);
        return `<td class="${num === 0 ? 'zero' : ''}">${esc(val)}</td>`;
      });
      tr.innerHTML = cells.join('');
      tbody.appendChild(tr);
    });

    // Subtitle
    const named = activeRows.length;
    document.getElementById('subtitle').textContent = `${named} active participant${named !== 1 ? 's' : ''}`;
  }

  function esc(str) {
    return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function openModal() {
    const saved = localStorage.getItem('mm_kisat_raw') || DEFAULT_DATA;
    document.getElementById('pasteArea').value = saved;
    document.getElementById('modalOverlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
  }

  function applyData() {
    const raw = document.getElementById('pasteArea').value.trim();
    const data = parseData(raw);
    if (!data) { alert('Could not parse data. Make sure it is tab-separated with a header row.'); return; }
    localStorage.setItem('mm_kisat_raw', raw);
    localStorage.setItem('mm_kisat_updated', new Date().toISOString());
    render(data);
    updateTimestamp();
    closeModal();
  }

  function updateTimestamp() {
    const ts = localStorage.getItem('mm_kisat_updated');
    const el = document.getElementById('lastUpdated');
    if (ts) {
      const d = new Date(ts);
      el.textContent = 'Last updated: ' + d.toLocaleString();
    } else {
      el.textContent = 'Showing default data — click "Update Data" to paste your latest standings.';
    }
  }

  function init() {
    const saved = localStorage.getItem('mm_kisat_raw');
    const raw = saved || DEFAULT_DATA;
    const data = parseData(raw);
    if (data) render(data);
    updateTimestamp();
  }

  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  init();
</script>
</body>
</html>
