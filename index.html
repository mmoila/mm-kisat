<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MM-Kisat Tulostaulukko</title>
  <style>
    :root {
      --gold: #FFD700;
      --silver: #C0C0C0;
      --bronze: #CD7F32;
      --bg: #0f1117;
      --card: #1a1d27;
      --border: #2a2d3a;
      --text: #e8eaf0;
      --muted: #6b7280;
      --accent: #3b82f6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1d27 0%, #0f1117 100%);
      border-bottom: 1px solid var(--border);
      padding: 24px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }

    .header-left h1 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(90deg, #60a5fa, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-left p {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 4px;
    }

    .refresh-btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background 0.2s, opacity 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .refresh-btn:hover { background: #2563eb; }
    .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    .loading .spinner { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-banner {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
      padding: 12px 20px;
      font-size: 0.85rem;
      text-align: center;
      display: none;
    }

    .error-banner.visible { display: block; }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 20px;
    }

    .podium {
      display: flex;
      gap: 16px;
      margin-bottom: 32px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .podium-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 28px;
      text-align: center;
      min-width: 160px;
      flex: 1;
      max-width: 220px;
      position: relative;
      overflow: hidden;
    }

    .podium-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
    }

    .podium-card.rank-1::before { background: var(--gold); }
    .podium-card.rank-2::before { background: var(--silver); }
    .podium-card.rank-3::before { background: var(--bronze); }

    .podium-medal { font-size: 1.8rem; margin-bottom: 8px; }
    .podium-name { font-size: 1.1rem; font-weight: 700; margin-bottom: 4px; }
    .podium-points { font-size: 1.6rem; font-weight: 800; color: var(--accent); }
    .podium-points-label { font-size: 0.75rem; color: var(--muted); }
    .podium-rank { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }

    .table-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    .table-header {
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 1rem;
    }

    .table-wrap { overflow-x: auto; }

    table { width: 100%; border-collapse: collapse; }

    thead th {
      background: rgba(255,255,255,0.03);
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 12px 16px;
      text-align: right;
      white-space: nowrap;
      border-bottom: 1px solid var(--border);
    }

    thead th:first-child,
    thead th:nth-child(2),
    thead th:nth-child(3) { text-align: left; }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.03); }
    tbody tr.empty-slot { opacity: 0.3; }

    td {
      padding: 14px 16px;
      font-size: 0.9rem;
      text-align: right;
      white-space: nowrap;
    }

    td:first-child,
    td:nth-child(2),
    td:nth-child(3) { text-align: left; }

    .rank-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px; height: 28px;
      border-radius: 50%;
      font-size: 0.8rem;
      font-weight: 700;
    }

    .rank-1 .rank-badge { background: rgba(255,215,0,0.15); color: var(--gold); }
    .rank-2 .rank-badge { background: rgba(192,192,192,0.15); color: var(--silver); }
    .rank-3 .rank-badge { background: rgba(205,127,50,0.15); color: var(--bronze); }

    .name-cell { font-weight: 600; }
    .total-cell { font-weight: 700; color: var(--accent); }
    .zero { color: var(--muted); }

    .last-updated {
      text-align: right;
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 16px;
    }

    @media (max-width: 600px) {
      header { padding: 16px; }
      .header-left h1 { font-size: 1.3rem; }
      main { padding: 16px 12px; }
      .podium-card { min-width: 120px; padding: 16px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>🏃 MM-Kisat Tulostaulukko ⚽</h1>
    <p id="subtitle">Ladataan...</p>
  </div>
  <button class="refresh-btn" id="refreshBtn" onclick="loadData()">
    <span class="spinner" id="spinner"></span>
    Päivitä
  </button>
</header>

<div class="error-banner" id="errorBanner"></div>

<main>
  <div class="podium" id="podium"></div>
  <div class="table-card">
    <div class="table-header">Kaikki osallistujat</div>
    <div class="table-wrap">
      <table>
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
  <div class="last-updated" id="lastUpdated"></div>
</main>

<script>
  const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRM37jNS4oQUGxxYaXiAMJcKxVI0x6O-iDIL4_SBkmoNIIbFKIaVVCWqB6pvvrXrU3vhvaIfKD7JW5V/pub?gid=0&single=true&output=csv';
  const MEDALS = ['🥇', '🥈', '🥉'];

  function parseCSV(text) {
    const lines = text.trim().split('\n');
    if (lines.length < 2) return null;

    function splitRow(line) {
      const cells = [];
      let cur = '', inQ = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') {
          if (inQ && line[i+1] === '"') { cur += '"'; i++; }
          else inQ = !inQ;
        } else if (ch === ',' && !inQ) {
          cells.push(cur.trim()); cur = '';
        } else {
          cur += ch;
        }
      }
      cells.push(cur.trim());
      return cells;
    }

    const headers = splitRow(lines[0]);
    const rows = lines.slice(1).map(line => {
      const cells = splitRow(line);
      const obj = {};
      headers.forEach((h, i) => obj[h] = cells[i] ?? '');
      return obj;
    });
    return { headers, rows };
  }

  function toNum(val) {
    if (!val || val === '0') return 0;
    return parseFloat(String(val).replace(',', '.')) || 0;
  }

  function esc(str) {
    return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function render(data) {
    const { headers, rows } = data;
    const activeRows = rows.filter(r => r['Name'] && r['Name'] !== 'X' && r['Name'] !== '');
    const emptyRows = rows.filter(r => !r['Name'] || r['Name'] === 'X' || r['Name'] === '');

    const sorted = [...activeRows].sort((a, b) => {
      const ra = parseInt(a['Rank']) || 99;
      const rb = parseInt(b['Rank']) || 99;
      if (ra !== rb) return ra - rb;
      return toNum(b['Total']) - toNum(a['Total']);
    });

    // Podium
    const podium = document.getElementById('podium');
    podium.innerHTML = '';
    sorted.slice(0, 3).forEach((row, i) => {
      const rank = parseInt(row['Rank']);
      const card = document.createElement('div');
      card.className = `podium-card rank-${rank <= 3 ? rank : i+1}`;
      card.innerHTML = `
        <div class="podium-medal">${MEDALS[i] || ''}</div>
        <div class="podium-name">${esc(row['Name'])}</div>
        <div class="podium-points">${row['Total'] || '0'}</div>
        <div class="podium-points-label">pistettä</div>
        <div class="podium-rank">Sija #${row['Rank']}</div>
      `;
      podium.appendChild(card);
    });

    // Table
    const showHeaders = headers.filter(h => h !== 'Sheet' && h !== '');
    document.getElementById('tableHead').innerHTML =
      '<tr>' + showHeaders.map(h => `<th>${esc(h)}</th>`).join('') + '</tr>';

    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    [...sorted, ...emptyRows].forEach(row => {
      const rank = parseInt(row['Rank']) || 99;
      const isEmpty = !row['Name'] || row['Name'] === 'X' || row['Name'] === '';
      const tr = document.createElement('tr');
      tr.className = (isEmpty ? 'empty-slot ' : '') + (rank <= 3 ? `rank-${rank}` : '');
      tr.innerHTML = showHeaders.map(h => {
        const val = row[h] ?? '';
        if (h === 'Rank') return `<td><span class="rank-badge">${esc(val)}</span></td>`;
        if (h === 'Name') return `<td class="name-cell">${esc(val)}</td>`;
        if (h === 'Total') return `<td class="total-cell">${esc(val)}</td>`;
        return `<td class="${toNum(val) === 0 ? 'zero' : ''}">${esc(val)}</td>`;
      }).join('');
      tbody.appendChild(tr);
    });

    const named = activeRows.length;
    document.getElementById('subtitle').textContent = `${named} osallistujaa`;
  }

  function setLoading(on) {
    const btn = document.getElementById('refreshBtn');
    btn.disabled = on;
    btn.classList.toggle('loading', on);
  }

  function showError(msg) {
    const el = document.getElementById('errorBanner');
    el.textContent = msg;
    el.classList.add('visible');
  }

  function clearError() {
    document.getElementById('errorBanner').classList.remove('visible');
  }

  async function loadData() {
    setLoading(true);
    clearError();
    try {
      const res = await fetch(CSV_URL + '&t=' + Date.now());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const text = await res.text();
      const data = parseCSV(text);
      if (!data) throw new Error('Could not parse CSV');
      render(data);
      document.getElementById('lastUpdated').textContent =
        'Päivitetty: ' + new Date().toLocaleString('fi-FI');
    } catch (e) {
      showError('Tietojen lataus Google Sheetsistä epäonnistui: ' + e.message + '. Varmista että taulukko on julkaistu.');
      document.getElementById('subtitle').textContent = 'Virhe tietojen latauksessa';
    } finally {
      setLoading(false);
    }
  }

  loadData();
</script>
</body>
</html>
